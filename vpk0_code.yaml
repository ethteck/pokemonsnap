# Splat config for the decompressed AAA610 VPK0 segment.

options:
  target_path: assets/AAA610.bin
  platform: n64
  basename: vpk0_code
  base_path: .
  compiler: IDO
  extensions_path: tools/splat_ext
  symbol_addrs_path: symbol_addrs_vpk0_code.txt
  ld_script_path: build/vpk0_code.ld
  ld_symbol_header_path: build/include/ld_addrs_vpk0_code.h
  undefined_funcs_auto_path: build/undefined_funcs_auto_vpk0_code.txt
  undefined_syms_auto_path: build/undefined_syms_auto_vpk0_code.txt

segments:
  - name: vpk0_code
    dir: vpk0_code
    type: code
    start: 0x0
    vram: 0x80200000
    subsegments:
      - [0x0, data, vpk0_code]
      - [0x50]
  - [0x50]
