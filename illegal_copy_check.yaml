# Splat config for the decompressed AAA610 VPK0 illegal copy check segment.

options:
  target_path: assets/AAA610.bin
  platform: n64
  basename: illegal_copy_check
  base_path: .
  compiler: IDO
  extensions_path: tools/splat_ext
  symbol_addrs_path: symbol_addrs_illegal_copy_check.txt
  ld_script_path: build/illegal_copy_check.ld
  ld_symbol_header_path: build/include/ld_addrs_illegal_copy_check.h
  undefined_funcs_auto_path: build/undefined_funcs_auto_illegal_copy_check.txt
  undefined_syms_auto_path: build/undefined_syms_auto_illegal_copy_check.txt

segments:
  - name: illegal_copy_check
    dir: illegal_copy_check
    type: code
    start: 0x0
    vram: 0x80200000
    subsegments:
      - [0x0, c, illegal_copy_check]
      - [0x50]
  - [0x50]
