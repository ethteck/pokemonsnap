# Splat config for the decompressed AA0B80 VPK0 Nintendo 64 logo segment.

options:
  target_path: assets/AA0B80.bin
  platform: n64
  basename: nintendo64_logo
  base_path: .
  compiler: IDO
  extensions_path: tools/splat_ext
  symbol_addrs_path: symbol_addrs_nintendo64_logo.txt
  ld_script_path: build/nintendo64_logo.ld
  ld_symbol_header_path: build/include/ld_addrs_nintendo64_logo.h
  undefined_funcs_auto_path: build/undefined_funcs_auto_nintendo64_logo.txt
  undefined_syms_auto_path: build/undefined_syms_auto_nintendo64_logo.txt

segments:
  - name: nintendo64_logo
    dir: nintendo64_logo
    type: code
    start: 0x0
    vram: 0x802B5000
    subsegments:
      - [auto, c, sprites]
      - start: 0x0
        type: .data
        name: sprites
        dir: sprites
        subsegments:
          - { start: 0x0, type: snap_sprite, name: D_802BC0C0, header_rom: 0x70C0 }
      - [0x7110]
  - [0x7110]
