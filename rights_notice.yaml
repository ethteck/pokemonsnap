# Splat config for the decompressed AA0B80 VPK0 rights notice segment.

options:
  target_path: assets/AA0B80.bin
  platform: n64
  basename: rights_notice
  base_path: .
  compiler: IDO
  extensions_path: tools/splat_ext
  symbol_addrs_path: symbol_addrs_rights_notice.txt
  ld_script_path: build/rights_notice.ld
  ld_symbol_header_path: build/include/ld_addrs_rights_notice.h
  undefined_funcs_auto_path: build/undefined_funcs_auto_rights_notice.txt
  undefined_syms_auto_path: build/undefined_syms_auto_rights_notice.txt

segments:
  - name: rights_notice
    dir: rights_notice
    type: code
    start: 0x0
    vram: 0x802B5000
    subsegments:
      - [0x0, data, rights_notice]
      - [0x7110]
  - [0x7110]
